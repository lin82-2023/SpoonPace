<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Variant 2: Dot Matrix - Gentle Heartbeat Rhythm -->
  <!-- Concept: Dots arranged in a gentle wave pattern representing steady pacing -->
  <g fill="currentColor">
    <!-- Gentle wave pattern - dots get larger at peaks, smaller at troughs -->
    <!-- Row 1 -->
    <circle cx="20" cy="35" r="2.0" opacity="0.5"/>
    <circle cx="32" cy="28" r="3.0" opacity="0.8"/>
    <circle cx="44" cy="24" r="3.5" opacity="1.0"/>
    <circle cx="56" cy="28" r="3.0" opacity="0.8"/>
    <circle cx="68" cy="35" r="2.0" opacity="0.5"/>
    <circle cx="80" cy="45" r="1.5" opacity="0.3"/>
    <!-- Row 2 -->
    <circle cx="15" cy="50" r="1.5" opacity="0.3"/>
    <circle cx="27" cy="45" r="2.5" opacity="0.6"/>
    <circle cx="39" cy="38" r="3.2" opacity="0.9"/>
    <circle cx="50" cy="35" r="3.8" opacity="1.0"/>
    <circle cx="61" cy="38" r="3.2" opacity="0.9"/>
    <circle cx="73" cy="45" r="2.5" opacity="0.6"/>
    <circle cx="85" cy="50" r="1.5" opacity="0.3"/>
    <!-- Row 3 -->
    <circle cx="20" cy="65" r="2.0" opacity="0.5"/>
    <circle cx="32" cy="72" r="3.0" opacity="0.8"/>
    <circle cx="44" cy="76" r="3.5" opacity="1.0"/>
    <circle cx="56" cy="72" r="3.0" opacity="0.8"/>
    <circle cx="68" cy="65" r="2.0" opacity="0.5"/>
    <circle cx="80" cy="55" r="1.5" opacity="0.3"/>
    <!-- Center accent -->
    <circle cx="50" cy="50" r="4" opacity="1.0"/>
  </g>
</svg>
